<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sapito 3.0">
  <meta name="theme-color" content="#1a3a2a">
  <title>Control Sapito 3.0 – Algarrobo</title>
  <style>
    html, body { width: 100% !important; max-width: 100% !important; overflow-x: hidden !important; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde-oscuro:  #EBF8FF;
      --verde-medio:   #A1D6F7;
      --verde-claro:   #0F6AA3;
      --verde-suave:   #064975;
      --verde-pale:    #FF8282;
      --blanco:        #ffffff;
      --gris-texto:    #374151;
      --gris-suave:    #BAE4FF;
      --gris-borde:    #e5e7eb;
      --sombra:        0 4px 24px rgba(26,58,42,0.10);
      --sombra-hover:  0 8px 32px rgba(26,58,42,0.18);
      --radio:         16px;
      --font:          'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html { height: 100%; -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font);
      background: linear-gradient(#FAF7F7);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      color: var(--gris-texto);
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .header {
      background: linear-gradient(135deg, var(--verde-oscuro) 0%, var(--verde-medio) 100%);
      box-shadow: 0 4px 20px rgba(26,58,42,0.25);
      position: sticky; top: 0; z-index: 10;
    }
    .header-inner {
      max-width: 720px; margin: 0 auto;
      padding: 16px 20px; display: flex; align-items: center; gap: 16px;
    }
    .logo-wrap {
      flex-shrink: 0; background: rgba(255,255,255,0.12);
      border-radius: 10px; padding: 8px 12px;
      border: 1px solid rgba(255,255,255,0.20);
    }
    .logo { height: 40px; width: auto; display: block; object-fit: contain; }
    .header-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .header-tag { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.55); }
    .header-title { font-size: 22px; font-weight: 800; color: var(--blanco); line-height: 1.1; letter-spacing: -0.5px; white-space: nowrap; }
    .header-title .ver { color: #74c69d; }
    .header-loc { font-size: 12px; color: rgba(255,255,255,0.70); font-weight: 500; }

    .main { flex: 1; max-width: 720px; width: 100%; margin: 0 auto; padding: 20px 16px 32px; display: flex; flex-direction: column; gap: 16px; }

    .search-card { background: var(--blanco); border-radius: var(--radio); padding: 20px; box-shadow: var(--sombra); border: 1px solid var(--gris-borde); }
    .search-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--verde-medio); margin-bottom: 12px; }
    .search-row { display: flex; gap: 10px; align-items: stretch; }
    .input-wrap { flex: 1; position: relative; }
    .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
    .search-input {
      width: 100%; padding: 14px 14px 14px 42px;
      border: 2px solid var(--gris-borde); border-radius: 12px;
      font-size: 16px; font-family: var(--font); color: var(--gris-texto);
      background: var(--blanco); transition: border-color 0.2s, box-shadow 0.2s;
      outline: none; -webkit-appearance: none; appearance: none;
    }
    .search-input:focus { border-color: var(--verde-claro); background: var(--blanco); box-shadow: 0 0 0 4px rgba(64,145,108,0.12); }
    .search-input::placeholder { color: #9ca3af; }

    .suggestions {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--blanco); border: 1.5px solid var(--verde-claro);
      border-radius: 10px; box-shadow: var(--sombra-hover); z-index: 100; overflow: hidden;
    }
    .suggestions.hidden { display: none; }
    .suggestion-item {
      padding: 14px 16px; cursor: pointer; font-size: 15px; font-weight: 500;
      color: #1F1E1E; border-bottom: 1px solid var(--gris-borde);
      transition: background 0.15s; min-height: 44px; display: flex;
      align-items: center; flex-direction: column; justify-content: center;
    }
    .suggestion-item:last-child { border-bottom: none; }
    .suggestion-item:hover, .suggestion-item.active { background: #E8FFFF; }

    .btn-buscar {
      padding: 14px 20px;
      background: linear-gradient(135deg, var(--verde-medio), var(--verde-claro));
      color: var(--blanco); border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer; white-space: nowrap;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 12px rgba(45,106,79,0.30);
      min-height: 48px; min-width: 96px;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation;
    }
    .btn-buscar:active { transform: scale(0.97); opacity: 0.9; }
    .btn-buscar:disabled { opacity: 0.6; cursor: not-allowed; }

    .resultado { background: var(--blanco); border-radius: var(--radio); overflow: hidden; box-shadow: var(--sombra); border: 1px solid var(--gris-borde); animation: slideIn 0.3s ease; }
    .resultado.hidden { display: none; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

    .res-header { background: linear-gradient(135deg, var(--verde-oscuro), var(--verde-medio)); padding: 18px 20px; display: flex; align-items: center; gap: 12px; }
    .res-header-icon { font-size: 20px; }
    .res-header-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.60); }
    .res-header-sku { font-size: 18px; font-weight: 800; color: var(--blanco); }
    .res-body { padding: 20px; }
    .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .res-field { background: var(--gris-suave); border: 1.5px solid var(--gris-borde); border-radius: 12px; padding: 16px; }
    .res-field.highlight { background: var(--verde-suave); border-color: #95d5b2; grid-column: 1 / -1; }
    .res-field-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #6b7280; margin-bottom: 6px; }
    .res-field.highlight .res-field-label { color: var(--blanco); }
    .res-field-value { font-size: 14px; font-weight: 600; color: var(--blanco); line-height: 1.4; }
    .stock-number { font-size: 48px; font-weight: 900; color: var(--verde-claro); line-height: 1; letter-spacing: -1px; }
    .stock-unit { font-size: 13px; font-weight: 600; color: var(--verde-claro); margin-top: 4px; }
    .stock-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 10px; }
    .badge-ok   { background: #d1fae5; color: #065f46; }
    .badge-low  { background: #fef3c7; color: #92400e; }
    .badge-zero { background: #fee2e2; color: #991b1b; }

    .res-error { padding: 24px 20px; display: flex; align-items: center; gap: 14px; }
    .error-icon { font-size: 28px; }
    .error-title { font-size: 15px; font-weight: 700; color: #991b1b; }
    .error-msg { font-size: 13px; color: #6b7280; margin-top: 2px; }

    .loading { padding: 40px; text-align: center; color: var(--verde-medio); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--gris-suave); border-top-color: var(--verde-claro); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state { text-align: center; padding: 48px 20px; color: #9ca3af; }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty-text { font-size: 15px; line-height: 1.5; }

    .footer { text-align: center; padding: 16px; font-size: 11px; color: #9ca3af; border-top: 1px solid var(--gris-borde); background: var(--blanco); padding-bottom: calc(16px + env(safe-area-inset-bottom)); }

    @media (max-width: 480px) {
      .header-inner { padding: 14px 16px; gap: 12px; }
      .header-title { font-size: 19px; }
      .logo { height: 34px; }
      .main { padding: 16px 12px 24px; gap: 12px; }
      .search-card { padding: 16px; }
      .search-row { flex-direction: column; gap: 10px; }
      .btn-buscar { width: 100%; font-size: 16px; padding: 16px; }
      .res-grid { grid-template-columns: 1fr; }
      .res-field.highlight { grid-column: 1; }
      .stock-number { font-size: 52px; }
      .res-body { padding: 16px; }
    }
    .btn-scanner {
  padding: 14px;
  background: #f9fafb;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-size: 22px;
  cursor: pointer;
  min-height: 48px;
  min-width: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
   .btn-scanner:active { background: #d8f3dc; border-color: #40916c; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo-wrap">
        <img
          src="https://www.casaideas.com.bo/static/media/logo.40b7cd09.png"
          alt="Logo empresa" class="logo"
          onerror="this.style.display='none'"
        />
      </div>
      <div class="header-text">
        <span class="header-tag">SISTEMA DE INVENTARIO</span>
        <h1 class="header-title">Control Sapito <span class="ver">3.0</span></h1>
        <span class="header-loc">📍 Algarrobo</span>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="search-card">
      <p class="search-label">Ingresa SKU, código madre o descripción</p>
      <div class="search-row">
        <div class="input-wrap">
          <span class="input-icon">🔍</span>
          <input
            type="text" id="skuInput"
            placeholder="Ej: 32200000000, 220000, Descripción"
            autocomplete="off" class="search-input"
          />
          <div id="suggestions" class="suggestions hidden"></div>
        </div>
        <button class="btn-scanner" onclick="abrirScanner()" title="Escanear">📷</button>
        <button id="btnBuscar" class="btn-buscar" onclick="buscar()">Consultar</button>
      </div>
    </section>

    <section id="resultado" class="resultado hidden"></section>

    <div id="estadoVacio" class="empty-state">
      <div class="empty-icon">📦</div>
      <p class="empty-text">Escribe un SKU para consultar el stock disponible en bodega.</p>
    </div>
  </main>

  <footer class="footer">Control Sapito 3.0 · CasaIdeas Algarrobo</footer>

  <script>
    // ── CONFIG ──
    const API = 'https://script.google.com/macros/s/AKfycbzZzoElwZstS8NMBgB-c4cN4kXbkMZb5MUE0rzZ1CLrL7j3YW15u1Lh_wSeBuko8v4drQ/exec';

    let sugerenciaActiva = -1;
    let timeoutSugerencias;

    const input       = document.getElementById('skuInput');
    const suggestions = document.getElementById('suggestions');
    const resultado   = document.getElementById('resultado');
    const estadoVacio = document.getElementById('estadoVacio');

    // ── JSONP helper ──
    function jsonp(url, callback) {
      const fn  = '_cb' + Date.now();
      const old = document.getElementById('_jsonp');
      if (old) old.remove();
      window[fn] = function(data) {
        try { delete window[fn]; } catch(e) {}
        document.getElementById('_jsonp')?.remove();
        callback(data);
      };
      const s = document.createElement('script');
      s.id  = '_jsonp';
      s.src = url + '&callback=' + fn;
      s.onerror = function() {
        try { delete window[fn]; } catch(e) {}
        this.remove();
        callback(null);
      };
      document.head.appendChild(s);
    }

    // ── Teclado ──
    input.addEventListener('keydown', function(e) {
      const items = suggestions.querySelectorAll('.suggestion-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        sugerenciaActiva = Math.min(sugerenciaActiva + 1, items.length - 1);
        items.forEach((el,i) => el.classList.toggle('active', i === sugerenciaActiva));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        sugerenciaActiva = Math.max(sugerenciaActiva - 1, -1);
        items.forEach((el,i) => el.classList.toggle('active', i === sugerenciaActiva));
      } else if (e.key === 'Enter') {
        if (sugerenciaActiva >= 0 && items[sugerenciaActiva]) {
          input.value = items[sugerenciaActiva].dataset.sku;
          cerrarSugerencias();
        }
        buscar();
      } else if (e.key === 'Escape') {
        cerrarSugerencias();
      }
    });

    // ── Autocompletar ──
    input.addEventListener('input', function() {
      clearTimeout(timeoutSugerencias);
      const val = this.value.trim();
      if (val.length < 2) { cerrarSugerencias(); return; }

      timeoutSugerencias = setTimeout(() => {
        const esNumerico = /^\d+$/.test(val);

        if (esNumerico && val.length >= 5) {
          // Buscar como código madre primero
          jsonp(API + '?action=codigoMadre&codigo=' + encodeURIComponent(val), lista => {
            if (lista && lista.length > 0) {
              mostrarSugerenciasDesc(lista, true);
            } else {
              // Si no hay, buscar como SKU
              jsonp(API + '?action=sugerir&prefijo=' + encodeURIComponent(val), skus => {
                if (skus) mostrarSugerencias(skus.map(s => ({ sku: s, desc: '' })));
                else cerrarSugerencias();
              });
            }
          });
        } else if (esNumerico) {
          jsonp(API + '?action=sugerir&prefijo=' + encodeURIComponent(val), lista => {
            if (lista) mostrarSugerencias(lista.map(s => ({ sku: s, desc: '' })));
            else cerrarSugerencias();
          });
        } else {
          jsonp(API + '?action=descripcion&texto=' + encodeURIComponent(val), lista => {
            if (lista) mostrarSugerenciasDesc(lista, false);
            else cerrarSugerencias();
          });
        }
      }, 300);
    });

    function mostrarSugerencias(lista) {
      if (!lista || lista.length === 0) { cerrarSugerencias(); return; }
      sugerenciaActiva = -1;
      suggestions.innerHTML = lista.map(s =>
        `<div class="suggestion-item" data-sku="${s.sku}" onclick="elegirSugerencia('${s.sku}')">
          <span style="font-weight:700">${escHtml(s.sku)}</span>
        </div>`
      ).join('');
      suggestions.classList.remove('hidden');
    }

    function mostrarSugerenciasDesc(lista, esMadre) {
      if (!lista || lista.length === 0) { cerrarSugerencias(); return; }
      sugerenciaActiva = -1;
      const header = esMadre
        ? `<div style="padding:8px 14px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#6b7280;background:#f9fafb;border-bottom:1px solid #e5e7eb">
            📦 ${lista.length} variante${lista.length > 1 ? 's' : ''} encontrada${lista.length > 1 ? 's' : ''}
           </div>`
        : '';
      suggestions.innerHTML = header + lista.map(s =>
        `<div class="suggestion-item" data-sku="${s.sku}" onclick="elegirSugerencia('${s.sku}')">
          <span style="font-size:11px;color:#6b7280;display:block;font-family:monospace">${escHtml(s.sku)}</span>
          <span style="font-weight:600;font-size:13px">${escHtml(s.desc)}</span>
        </div>`
      ).join('');
      suggestions.classList.remove('hidden');
    }

    function elegirSugerencia(sku) {
      input.value = sku;
      cerrarSugerencias();
      buscar();
    }

    function cerrarSugerencias() {
      suggestions.classList.add('hidden');
      suggestions.innerHTML = '';
      sugerenciaActiva = -1;
    }

    document.addEventListener('click', e => {
      if (!e.target.closest('.input-wrap')) cerrarSugerencias();
    });

    // ── Buscar ──
    function buscar() {
      const sku = input.value.trim();
      if (!sku) { input.focus(); return; }
      cerrarSugerencias();
      mostrarLoading();
      jsonp(API + '?action=buscar&sku=' + encodeURIComponent(sku), data => {
        if (data) mostrarResultado(data);
        else mostrarErrorConexion({ message: 'Sin respuesta del servidor.' });
      });
    }

    function mostrarLoading() {
      estadoVacio.style.display = 'none';
      resultado.classList.remove('hidden');
      resultado.innerHTML = `<div class="loading"><div class="spinner"></div><p>Consultando bodega…</p></div>`;
    }

    function mostrarResultado(data) {
      if (data.success) {
        const stock = data.stock;
        const badge = stock === 0
          ? `<span class="stock-badge badge-zero">Sin stock</span>`
          : stock <= 5
          ? `<span class="stock-badge badge-low">Stock bajo</span>`
          : `<span class="stock-badge badge-ok">Disponible</span>`;
        resultado.innerHTML = `
          <div class="res-header">
            <span class="res-header-icon">📦</span>
            <div>
              <div class="res-header-label">Producto encontrado</div>
              <div class="res-header-sku">${escHtml(data.sku)}</div>
            </div>
          </div>
          <div class="res-body">
            <div class="res-grid">
              <div class="res-field highlight">
                <div class="res-field-label">Descripción</div>
                <div class="res-field-value">${escHtml(data.desc) || '<em style="color:#9ca3af">Sin descripción</em>'}</div>
              </div>
              <div class="res-field">
                <div class="res-field-label">Stock en Bodega</div>
                <div class="stock-number">${stock.toLocaleString('es-CL')}</div>
                <div class="stock-unit">unidades</div>
                ${badge}
              </div>
              <div class="res-field">
                <div class="res-field-label">SKU Consultado</div>
                <div class="res-field-value" style="font-family:monospace;font-size:17px">${escHtml(String(data.sku))}</div>
              </div>
            </div>
          </div>`;
      } else {
        resultado.innerHTML = `
          <div class="res-error">
            <div class="error-icon">🔎</div>
            <div>
              <div class="error-title">No se encontraron resultados</div>
              <div class="error-msg">${escHtml(data.error)}</div>
            </div>
          </div>`;
      }
      resultado.classList.remove('hidden');
    }

    function mostrarErrorConexion(err) {
      resultado.innerHTML = `
        <div class="res-error">
          <div class="error-icon">⚠️</div>
          <div>
            <div class="error-title">Error de conexión</div>
            <div class="error-msg">${escHtml(err.message || 'No se pudo conectar con la planilla.')}</div>
          </div>
        </div>`;
    }

    function escHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function abrirScanner() {
  const url = 'https://ferodria124.github.io/sapito-scanner/scanner.html?back=' 
              + encodeURIComponent(window.location.href);
  window.location.href = url;
}

// Al volver del escáner con SKU en la URL
window.addEventListener('load', () => {
  const params = new URLSearchParams(window.location.search);
  const sku    = params.get('sku');
  if (sku) {
    document.getElementById('skuInput').value = sku;
    buscar();
  }
});
  </script>
</body>
</html>
