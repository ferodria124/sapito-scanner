<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Escáner SKU – Sapito 3.0</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1a3a2a;
      --verde-medio: #2d6a4f;
      --verde-claro: #40916c;
      --verde-neon: #74c69d;
    }
    body {
      background: #000; color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--verde), var(--verde-medio));
      padding: 14px 20px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 800; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .btn-cerrar {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      font-size: 13px; font-weight: 700; padding: 8px 16px;
      border-radius: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Visor */
    .viewport {
      position: relative; flex: 1; overflow: hidden; background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    #reader {
      width: 100% !important;
      height: 100% !important;
      border: none !important;
    }
    /* Ocultar botones internos de html5-qrcode que no necesitamos */
    #reader__dashboard_section_swaplink,
    #reader__dashboard_section_fileselection,
    #reader__filescan_input { display: none !important; }

    #reader__scan_region {
      border: none !important;
      background: transparent !important;
    }
    #reader__scan_region img { display: none !important; }

    /* Esquinas personalizadas sobre el visor */
    .scan-overlay {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 5;
    }
    .scan-window {
      position: absolute;
      top: 20%; bottom: 30%; left: 8%; right: 8%;
    }
    .corner { position: absolute; width: 28px; height: 28px; border-color: var(--verde-neon); border-style: solid; }
    .corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
    .scan-line {
      position: absolute; left: 4px; right: 4px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--verde-neon), transparent);
      box-shadow: 0 0 10px var(--verde-neon);
      animation: scanLine 2s ease-in-out infinite;
    }
    @keyframes scanLine {
      0%   { top: 8px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 8px); opacity: 0; }
    }
    .overlay-top    { position: absolute; top: 0; left: 0; right: 0; height: 20%; background: rgba(0,0,0,0.55); }
    .overlay-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 30%; background: rgba(0,0,0,0.55); }
    .overlay-left   { position: absolute; top: 20%; bottom: 30%; left: 0; width: 8%; background: rgba(0,0,0,0.55); }
    .overlay-right  { position: absolute; top: 20%; bottom: 30%; right: 0; width: 8%; background: rgba(0,0,0,0.55); }
    .scan-hint {
      position: absolute; bottom: 32%; left: 0; right: 0;
      text-align: center; font-size: 13px;
      color: rgba(255,255,255,0.8); padding: 0 20px;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    /* Status */
    .status-bar {
      background: var(--verde); padding: 14px 20px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      flex-shrink: 0; min-height: 64px;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .status-text { font-size: 14px; color: rgba(255,255,255,0.8); }
    .status-text strong { color: #fff; display: block; font-size: 15px; }
    .status-bar.success { background: linear-gradient(135deg, #065f46, var(--verde-claro)); }

    /* Input manual */
    .manual-bar {
      background: #1a1a1a; padding: 10px 14px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom));
      display: flex; gap: 8px; flex-shrink: 0;
      border-top: 1px solid #333;
    }
    .manual-input {
      flex: 1; padding: 11px 14px;
      background: #2a2a2a; border: 1.5px solid #444;
      border-radius: 10px; color: #fff; font-size: 16px;
      font-family: monospace; outline: none;
      -webkit-appearance: none;
    }
    .manual-input:focus { border-color: var(--verde-neon); }
    .manual-input::placeholder { color: #555; }
    .btn-ok {
      padding: 11px 18px; background: var(--verde-claro);
      color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      white-space: nowrap; -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">📷 Escáner SKU</div>
      <div class="header-sub">Control Sapito 3.0 · Algarrobo</div>
    </div>
    <button class="btn-cerrar" onclick="cerrar()">✕ Cerrar</button>
  </div>

  <div class="viewport">
    <div id="reader"></div>
    <div class="scan-overlay">
      <div class="overlay-top"></div>
      <div class="overlay-bottom"></div>
      <div class="overlay-left"></div>
      <div class="overlay-right"></div>
      <div class="scan-window">
        <span class="corner tl"></span>
        <span class="corner tr"></span>
        <span class="corner bl"></span>
        <span class="corner br"></span>
        <div class="scan-line"></div>
      </div>
      <div class="scan-hint">Centra el código de barras dentro del recuadro</div>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <span>🔍</span>
    <span class="status-text" id="statusText">Buscando código de barras…</span>
  </div>

  <div class="manual-bar">
    <input type="number" inputmode="numeric" class="manual-input"
      id="manualInput" placeholder="O escribe el SKU manualmente…"/>
    <button class="btn-ok" onclick="confirmarManual()">✓ OK</button>
  </div>

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const backUrl = params.get('back') || '';
    let escaneado = false;
    let scanner   = null;

    async function iniciar() {
      scanner = new Html5Qrcode('reader');

      const config = {
        fps: 15,
        qrbox: { width: 280, height: 120 },
        aspectRatio: 1.0,
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
        ]
      };

     try {
  // Obtener cámaras disponibles y preferir trasera
  const camaras = await Html5Qrcode.getCameras();
  let camaraId;

  if (camaras.length > 1) {
    const trasera = camaras.find(c =>
      /back|rear|trasera|environment|0/i.test(c.label)
    );
    camaraId = trasera ? trasera.id : camaras[camaras.length - 1].id;

    const selector = document.createElement('select');
    selector.style.cssText = 'position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10;background:#1a3a2a;color:#fff;border:1px solid #74c69d;border-radius:8px;padding:6px 10px;font-size:13px;max-width:80%';
    camaras.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.label || `Cámara ${c.id}`;
      if (c.id === camaraId) opt.selected = true;
      selector.appendChild(opt);
    });
    selector.addEventListener('change', async () => {
      await scanner.stop();
      await scanner.start(selector.value, config,
        d => { if (!escaneado) exito(d); }, () => {});
    });
    document.querySelector('.viewport').appendChild(selector);
  } else {
    camaraId = camaras[0]?.id || { facingMode: 'environment' };
  }

  await scanner.start(
    camaraId,
    config,
    (decodedText) => {
      if (!escaneado) exito(decodedText);
    },
    () => {}
  );
} catch(err) {
  document.getElementById('statusText').innerHTML =
    `<strong style="color:#fca5a5">Sin acceso a cámara</strong>Usa el campo de abajo`;
  console.error(err);
}

    function exito(codigo) {
      escaneado = true;
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

      const bar = document.getElementById('statusBar');
      bar.className = 'status-bar success';
      bar.innerHTML = `<span>✅</span><span class="status-text"><strong>${codigo}</strong>¡Escaneado correctamente!</span>`;

      setTimeout(() => redirigir(codigo), 900);
    }

    function redirigir(codigo) {
      if (scanner) scanner.stop().catch(() => {});
      if (backUrl) {
        const url = new URL(backUrl);
        url.searchParams.set('sku', codigo);
        window.location.href = url.toString();
      } else {
        window.opener?.postMessage({ sku: codigo }, '*');
        window.close();
      }
    }

    function cerrar() {
      if (scanner) scanner.stop().catch(() => {});
      if (backUrl) window.location.href = backUrl;
      else window.close();
    }

    function confirmarManual() {
      const val = document.getElementById('manualInput').value.trim();
      if (val) exito(val);
    }

    document.getElementById('manualInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmarManual();
    });

    iniciar();
  </script>
</body>
</html>
</body>
</html>
