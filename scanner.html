<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Escáner SKU – Sapito 3.0</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1a3a2a;
      --verde-medio: #2d6a4f;
      --verde-claro: #40916c;
      --verde-neon: #74c69d;
    }
    body {
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--verde), var(--verde-medio));
      padding: 14px 20px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 10;
    }
    .header-title { font-size: 16px; font-weight: 800; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .btn-cerrar {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      font-size: 13px; font-weight: 700; padding: 8px 16px;
      border-radius: 20px; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Viewport cámara */
    .viewport {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: #000;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Overlay oscuro */
    .overlay-top    { position: absolute; top: 0; left: 0; right: 0; height: 20%; background: rgba(0,0,0,0.6); }
    .overlay-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 30%; background: rgba(0,0,0,0.6); }
    .overlay-left   { position: absolute; top: 20%; bottom: 30%; left: 0; width: 8%; background: rgba(0,0,0,0.6); }
    .overlay-right  { position: absolute; top: 20%; bottom: 30%; right: 0; width: 8%; background: rgba(0,0,0,0.6); }

    /* Ventana escaneo */
    .scan-window {
      position: absolute;
      top: 20%; bottom: 30%; left: 8%; right: 8%;
    }
    .corner { position: absolute; width: 28px; height: 28px; border-color: var(--verde-neon); border-style: solid; }
    .corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
    .scan-line {
      position: absolute; left: 4px; right: 4px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--verde-neon), transparent);
      box-shadow: 0 0 10px var(--verde-neon);
      animation: scanLine 2s ease-in-out infinite;
    }
    @keyframes scanLine {
      0%   { top: 8px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 8px); opacity: 0; }
    }
    .scan-hint {
      position: absolute;
      bottom: 32%; left: 0; right: 0;
      text-align: center; font-size: 13px;
      color: rgba(255,255,255,0.75); padding: 0 20px;
    }

    /* Canvas oculto para procesar frames */
    #canvas { display: none; }

    /* Status bar */
    .status-bar {
      background: var(--verde);
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      flex-shrink: 0; min-height: 70px;
      display: flex; align-items: center;
      justify-content: center; gap: 12px;
    }
    .status-text { font-size: 14px; color: rgba(255,255,255,0.8); }
    .status-text strong { color: #fff; display: block; font-size: 16px; }
    .status-bar.success {
      background: linear-gradient(135deg, #065f46, var(--verde-claro));
    }

    /* Error */
    .error-box {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.9);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 32px; text-align: center;
    }
    .error-box.show { display: flex; }
    .error-box h2 { font-size: 18px; color: #fca5a5; }
    .error-box p  { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.5; }
    .btn-retry {
      background: var(--verde-claro); color: #fff; border: none;
      padding: 12px 28px; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }

    /* Input manual */
    .manual-box {
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.92);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 32px; text-align: center;
    }
    .manual-box.show { display: flex; }
    .manual-box h2 { font-size: 16px; color: #fff; }
    .manual-input {
      width: 100%; padding: 14px 16px;
      border: 2px solid var(--verde-claro);
      border-radius: 12px; font-size: 18px;
      background: rgba(255,255,255,0.1);
      color: #fff; outline: none; text-align: center;
      font-family: monospace;
    }
    .manual-input::placeholder { color: rgba(255,255,255,0.4); }
    .btn-manual-ok {
      width: 100%; background: var(--verde-claro); color: #fff;
      border: none; padding: 14px; border-radius: 12px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }
    .btn-manual-cancel {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 14px; cursor: pointer; padding: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">📷 Escáner SKU</div>
      <div class="header-sub">Control Sapito 3.0 · Algarrobo</div>
    </div>
    <button class="btn-cerrar" onclick="cerrar()">✕ Cerrar</button>
  </div>

  <div class="viewport">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>
    <div class="overlay-left"></div>
    <div class="overlay-right"></div>

    <div class="scan-window">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <div class="scan-line"></div>
    </div>

    <div class="scan-hint">Centra el código de barras dentro del recuadro</div>

    <div class="error-box" id="errorBox">
      <h2>⚠️ Sin acceso a la cámara</h2>
      <p>Permite el acceso a la cámara en tu navegador.</p>
      <button class="btn-retry" onclick="iniciar()">Reintentar</button>
      <button class="btn-manual-cancel" onclick="mostrarManual()">✏️ Ingresar SKU manualmente</button>
    </div>

    <div class="manual-box" id="manualBox">
      <h2>✏️ Ingresa el SKU</h2>
      <input type="number" inputmode="numeric" class="manual-input"
        id="manualInput" placeholder="Ej: 3218632000115"/>
      <button class="btn-manual-ok" onclick="confirmarManual()">Confirmar</button>
      <button class="btn-manual-cancel" onclick="ocultarManual()">← Volver al escáner</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <span>🔍</span>
    <span class="status-text">Buscando código de barras…</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js"></script>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const backUrl = params.get('back') || '';
    let escaneado = false;
    let stream    = null;
    let reader    = null;

    async function iniciar() {
      document.getElementById('errorBox').classList.remove('show');
      escaneado = false;

      try {
        // Pedir cámara trasera
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width:  { ideal: 1280 },
            height: { ideal: 720 }
          }
        });

        const video = document.getElementById('video');
        video.srcObject = stream;
        await video.play();

        // Usar BrowserMultiFormatReader de ZXing
        reader = new ZXing.BrowserMultiFormatReader();
        reader.decodeFromVideoElement(video, (result, err) => {
          if (result && !escaneado) {
            escaneado = true;
            const codigo = result.getText();
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            mostrarExito(codigo);
            setTimeout(() => redirigir(codigo), 1000);
          }
        });

      } catch(err) {
        console.error(err);
        document.getElementById('errorBox').classList.add('show');
      }
    }

    function mostrarExito(codigo) {
      const bar = document.getElementById('statusBar');
      bar.className = 'status-bar success';
      bar.innerHTML = `<span>✅</span><span class="status-text"><strong>${codigo}</strong>¡Código escaneado!</span>`;
    }

    function redirigir(codigo) {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (reader) reader.reset();
      if (backUrl) {
        // Limpiar parámetros anteriores y agregar sku
        const url = new URL(backUrl);
        url.searchParams.set('sku', codigo);
        window.location.href = url.toString();
      } else {
        window.opener?.postMessage({ sku: codigo }, '*');
        window.close();
      }
    }

    function cerrar() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (reader) reader.reset();
      if (backUrl) window.location.href = backUrl;
      else window.close();
    }

    function mostrarManual() {
      document.getElementById('manualBox').classList.add('show');
      document.getElementById('manualInput').focus();
    }

    function ocultarManual() {
      document.getElementById('manualBox').classList.remove('show');
    }

    function confirmarManual() {
      const val = document.getElementById('manualInput').value.trim();
      if (!val) return;
      mostrarExito(val);
      setTimeout(() => redirigir(val), 800);
    }

    document.getElementById('manualInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmarManual();
    });

    // Iniciar al cargar
    iniciar();
  </script>
</body>
</html>
