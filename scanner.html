<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Escáner SKU – Sapito 3.0</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde: #1a3a2a;
      --verde-medio: #2d6a4f;
      --verde-claro: #40916c;
      --verde-neon: #74c69d;
    }
    body {
      background: #000; color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh; height: 100dvh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, var(--verde), var(--verde-medio));
      padding: 14px 20px;
      padding-top: calc(14px + env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .header-title { font-size: 16px; font-weight: 800; }
    .header-sub   { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .btn-cerrar {
      background: rgba(255,255,255,0.15); border: none; color: #fff;
      font-size: 13px; font-weight: 700; padding: 8px 16px;
      border-radius: 20px; cursor: pointer;
    }
    .viewport { position: relative; flex: 1; overflow: hidden; background: #000; }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #canvas { display: none; }

    .overlay-top    { position: absolute; top: 0; left: 0; right: 0; height: 20%; background: rgba(0,0,0,0.6); }
    .overlay-bottom { position: absolute; bottom: 0; left: 0; right: 0; height: 30%; background: rgba(0,0,0,0.6); }
    .overlay-left   { position: absolute; top: 20%; bottom: 30%; left: 0; width: 8%; background: rgba(0,0,0,0.6); }
    .overlay-right  { position: absolute; top: 20%; bottom: 30%; right: 0; width: 8%; background: rgba(0,0,0,0.6); }

    .scan-window { position: absolute; top: 20%; bottom: 30%; left: 8%; right: 8%; }
    .corner { position: absolute; width: 28px; height: 28px; border-color: var(--verde-neon); border-style: solid; }
    .corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }
    .scan-line {
      position: absolute; left: 4px; right: 4px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--verde-neon), transparent);
      box-shadow: 0 0 10px var(--verde-neon);
      animation: scanLine 2s ease-in-out infinite;
    }
    @keyframes scanLine {
      0%   { top: 8px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: calc(100% - 8px); opacity: 0; }
    }
    .scan-hint {
      position: absolute; bottom: 32%; left: 0; right: 0;
      text-align: center; font-size: 13px;
      color: rgba(255,255,255,0.75); padding: 0 20px;
    }

    .status-bar {
      background: var(--verde); padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      flex-shrink: 0; min-height: 70px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
    }
    .status-text { font-size: 14px; color: rgba(255,255,255,0.8); }
    .status-text strong { color: #fff; display: block; font-size: 16px; }
    .status-bar.success { background: linear-gradient(135deg, #065f46, var(--verde-claro)); }

    /* Manual input siempre visible abajo */
    .manual-bar {
      background: #111; padding: 12px 16px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom));
      display: flex; gap: 8px; flex-shrink: 0;
      border-top: 1px solid #333;
    }
    .manual-input {
      flex: 1; padding: 12px 14px;
      background: #222; border: 1.5px solid #444;
      border-radius: 10px; color: #fff; font-size: 16px;
      font-family: monospace; outline: none;
    }
    .manual-input:focus { border-color: var(--verde-neon); }
    .manual-input::placeholder { color: #666; }
    .btn-manual-ok {
      padding: 12px 16px; background: var(--verde-claro);
      color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">📷 Escáner SKU</div>
      <div class="header-sub">Control Sapito 3.0 · Algarrobo</div>
    </div>
    <button class="btn-cerrar" onclick="cerrar()">✕ Cerrar</button>
  </div>

  <div class="viewport">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>
    <div class="overlay-left"></div>
    <div class="overlay-right"></div>
    <div class="scan-window">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>
      <div class="scan-line"></div>
    </div>
    <div class="scan-hint" id="hint">Centra el código de barras dentro del recuadro</div>
  </div>

  <div class="status-bar" id="statusBar">
    <span>🔍</span>
    <span class="status-text" id="statusText">Escaneando…</span>
  </div>

  <!-- Input manual siempre disponible -->
  <div class="manual-bar">
    <input type="number" inputmode="numeric" class="manual-input"
      id="manualInput" placeholder="O escribe el SKU aquí…"/>
    <button class="btn-manual-ok" onclick="confirmarManual()">✓ OK</button>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const backUrl = params.get('back') || '';
    let escaneado = false;
    let stream    = null;
    let detector  = null;
    let animFrame = null;

    async function iniciar() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
        });

        const video = document.getElementById('video');
        video.srcObject = stream;
        await video.play();

        // Intentar API nativa primero (Chrome 83+ en Android)
        if ('BarcodeDetector' in window) {
          document.getElementById('statusText').textContent = 'Usando detector nativo…';
          detector = new BarcodeDetector({
            formats: ['ean_13', 'ean_8', 'code_128', 'code_39', 'qr_code', 'upc_a', 'upc_e']
          });
          escanearConDetector(video);
        } else {
          // Fallback: ZXing
          document.getElementById('statusText').textContent = 'Cargando lector…';
          cargarZXing(video);
        }

      } catch(err) {
        document.getElementById('statusText').innerHTML =
          `<strong style="color:#fca5a5">⚠️ Sin cámara</strong>Usa el campo de abajo`;
        document.getElementById('hint').textContent = 'Escribe el SKU manualmente abajo';
      }
    }

    // ── Detector nativo (BarcodeDetector API) ──
    async function escanearConDetector(video) {
      if (escaneado) return;
      try {
        const codes = await detector.detect(video);
        if (codes.length > 0) {
          exito(codes[0].rawValue);
          return;
        }
      } catch(e) {}
      animFrame = requestAnimationFrame(() => escanearConDetector(video));
    }

    // ── Fallback ZXing ──
    function cargarZXing(video) {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js';
      s.onload = () => {
        document.getElementById('statusText').textContent = 'Escaneando…';
        const reader = new ZXing.BrowserMultiFormatReader();
        reader.decodeFromVideoElement(video, (result, err) => {
          if (result && !escaneado) exito(result.getText());
        });
      };
      s.onerror = () => {
        document.getElementById('statusText').innerHTML =
          `<strong style="color:#fca5a5">⚠️ Error al cargar</strong>Usa el campo de abajo`;
      };
      document.head.appendChild(s);
    }

    function exito(codigo) {
      escaneado = true;
      if (animFrame) cancelAnimationFrame(animFrame);
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

      const bar = document.getElementById('statusBar');
      bar.className = 'status-bar success';
      bar.innerHTML = `<span>✅</span><span class="status-text"><strong>${codigo}</strong>¡Escaneado!</span>`;

      setTimeout(() => redirigir(codigo), 800);
    }

    function redirigir(codigo) {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (backUrl) {
        const url = new URL(backUrl);
        url.searchParams.set('sku', codigo);
        window.location.href = url.toString();
      } else {
        window.opener?.postMessage({ sku: codigo }, '*');
        window.close();
      }
    }

    function cerrar() {
      if (stream) stream.getTracks().forEach(t => t.stop());
      if (animFrame) cancelAnimationFrame(animFrame);
      if (backUrl) window.location.href = backUrl;
      else window.close();
    }

    function confirmarManual() {
      const val = document.getElementById('manualInput').value.trim();
      if (val) exito(val);
    }

    document.getElementById('manualInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmarManual();
    });

    iniciar();
  </script>
</body>
</html>
